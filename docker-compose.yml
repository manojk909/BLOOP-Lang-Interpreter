version: "3.9"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bloop-backend
    ports:
      - "8080:8080"
    environment:
      - JAVA_OPTS=-Xmx400m -Xms128m -XX:+UseG1GC
    healthcheck:
      test:
        ["CMD-SHELL", "wget -qO- http://localhost:8080/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=http://localhost:8080
    container_name: bloop-frontend
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
